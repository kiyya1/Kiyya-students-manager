<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <title>የተማሪዎች ምዝገባ ቅጽ (School Registration)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%); min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
    .card-custom { border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); border: none; }
    .fee-badge { font-size: 1.1rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-7">
        <div class="card card-custom p-4 p-md-5 bg-white">
          <div class="text-center mb-4">
            <h2 class="fw-bold text-primary">🏫 የተማሪዎች ምዝገባ ቅጽ</h2>
            <p class="text-muted">እባክዎን የተማሪውን እና የክፍያ መረጃዎችን በትክክል ይሙሉ</p>
          </div>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form action="/add_student" method="POST" class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">የተማሪው ሙሉ ስም *</label>
              <input type="text" name="full_name" class="form-control" placeholder="ምሳሌ፦ ሄለን ሀንት" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">ክፍል (Grade) *</label>
              <select name="grade" class="form-select" required>
                <option value="">ክፍል ይምረጡ...</option>
                {% for i in range(1, 13) %}
                  {% set g = i ~ ("st" if i==1 else "nd" if i==2 else "rd" if i==3 else "th") ~ " Grade" %}
                  <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">ስልክ ቁጥር *</label>
              <input type="tel" name="phone" class="form-control" placeholder="0911000000" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">🚌 ስኩል ባስ (Bus Service)</label>
              <select name="bus_service" id="bus_service" onchange="calculateTotalFee()" class="form-select">
                <option value="እፈልጋለሁ (Yes Bus)">እፈልጋለሁ (+ {{ "{:,.0f}".format(settings.bus_fee) if settings else 1500 }} ETB)</option>
                <option value="አልፈልግም (No Bus)" selected>አልፈልግም (No Bus)</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-bold">መኖሪያ አድራሻ</label>
              <input type="text" name="address" class="form-control" value="{{ settings.default_address if settings else 'Addis Ababa' }}">
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">የክፍያ አይነት *</label>
              <select name="payment_type" id="payment_type" onchange="calculateTotalFee()" class="form-select" required>
                <option value="Monthly Payment" data-amount="{{ settings.monthly_fee if settings else 3000 }}">የወር ክፍያ ({{ "{:,.0f}".format(settings.monthly_fee) if settings else 3000 }} ETB)</option>
                <option value="Term Payment" data-amount="{{ settings.term_fee if settings else 8000 }}">የተርም ክፍያ ({{ "{:,.0f}".format(settings.term_fee) if settings else 8000 }} ETB)</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">የሚከፈለዉ ጠቅላላ ክፍያ (Total Due)</label>
              <div class="alert alert-info py-2 px-3 m-0 d-flex justify-content-between align-items-center">
                <span>የሚጠበቅ ክፍያ፦</span>
                <span class="fee-badge text-primary" id="calculatedTotalDisplay">0 ETB</span>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">የተከፈለ ገንዘብ (ETB) *</label>
              <input type="number" step="0.01" id="amount_paid" name="amount_paid" class="form-control" placeholder="0.00" required>
            </div>

            <div class="col-md-6">
              <label class="form-label fw-bold">የክፍያ መንገድ *</label>
              <select name="payment_method" class="form-select" required>
                <option value="CBE Birr/CBE">CBE / CBE Birr</option>
                <option value="Telebirr">Telebirr</option>
                <option value="Cooperative Bank (CBO)">Cooperative Bank (CBO)</option>
                <option value="Awash Bank">Awash Bank</option>
                <option value="Cash">በጥሬ ገንዘብ (Cash)</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label fw-bold">የደረሰኝ / የትራንዛክሽን ቁጥር (FT Ref) *</label>
              <input type="text" name="ft_approval_no" class="form-control" placeholder="ምሳሌ፦ FT09joifj9p" required>
            </div>

            <div class="col-12 mt-4">
              <button type="submit" class="btn btn-primary w-100 py-2 fs-5 fw-bold shadow-sm">
                📝 ምዝገባውን መዝግብ
              </button>
            </div>
          </form>

          <div class="text-center mt-4 border-top pt-3">
            <a href="/login" class="text-decoration-none text-muted fw-bold"><i class="bi bi-shield-lock me-1"></i>የአስተዳዳሪ ገፅ (Admin Login)</a>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script>
    const busFeeAmount = {{ settings.bus_fee if settings else 1500 }};

    function calculateTotalFee() {
      const paymentSelect = document.getElementById("payment_type");
      const selectedOption = paymentSelect.options[paymentSelect.selectedIndex];
      const baseFee = parseFloat(selectedOption.getAttribute("data-amount")) || 0;
      
      const busSelect = document.getElementById("bus_service").value;
      let totalFee = baseFee;

      if (busSelect.includes("እፈልጋለሁ") || busSelect.includes("Yes")) {
        totalFee += busFeeAmount;
      }

      document.getElementById("calculatedTotalDisplay").innerText = totalFee.toLocaleString() + " ETB";
      
      // Auto-fill amount paid field by default
      const amountPaidInput = document.getElementById("amount_paid");
      if (!amountPaidInput.value) {
        amountPaidInput.value = totalFee;
      }
    }

    // Run on page load
    window.onload = calculateTotalFee;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
