<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <title>የተማሪዎች ምዝገባ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container my-5" style="max-width: 750px;">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>🎓 የተማሪዎች ምዝገባ ቅጽ</h2>
      <a href="/login" class="btn btn-outline-primary btn-sm">Admin Login</a>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form action="/add_student" method="POST">
          
          <div class="mb-3">
            <label class="form-label">ሙሉ ስም (Full Name)</label>
            <input type="text" name="full_name" class="form-control" required placeholder="የተማሪው ሙሉ ስም">
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">ክፍል (Grade)</label>
              <input type="text" name="grade" class="form-control" required placeholder="ምሳሌ፡ 3ኛ">
            </div>
            <div class="col-md-6">
              <label class="form-label">ስልክ ቁጥር (Phone Number)</label>
              <input type="text" name="phone" class="form-control" placeholder="0911...">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">አድራሻ (Address)</label>
            <input type="text" name="address" class="form-control" value="{{ settings.default_address if settings and settings.default_address else '' }}" placeholder="ክፍለ ከተማ / ወረዳ / የቤት ቁጥር">
          </div>

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">የክፍያ መንገድ</label>
              <select name="payment_method" class="form-select">
                <option value="CBE">CBE (ንግድ ባንክ)</option>
                <option value="Telebirr">Telebirr (ቴሌብር)</option>
                <option value="Dashen Bank">Dashen Bank</option>
                <option value="Awash Bank">Awash Bank</option>
                <option value="Bank of Abyssinia">Abyssinia Bank</option>
                <option value="Cash">Cash (በጥሬ ገንዘብ)</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">የክፍያ አይነት</label>
              <select name="payment_type" id="paymentTypeSelect" class="form-select" onchange="updateAmount()">
                <option value="Monthly (1 Month)">ወርሃዊ (Monthly)</option>
                <option value="Term (3 Months)">ተርም (Term - 3 Months)</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">የሚጠበቅ ክፍያ (ETB)</label>
              <input type="text" id="amountDisplay" class="form-control fw-bold text-primary" value="{{ settings.monthly_fee if settings else '3000' }} ETB" readonly>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold text-success">አሁን የከፈሉት መጠን (ETB)</label>
              <input type="number" step="0.01" name="amount_paid" id="amountPaidInput" class="form-control border-success fw-bold" value="{{ settings.monthly_fee if settings else 3000 }}" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">FT / Reference Approval No.</label>
              <input type="text" name="ft_approval_no" class="form-control" placeholder="ምሳሌ፡ FT240723XXXX" required>
            </div>
          </div>

          <button type="submit" class="btn btn-success w-100 btn-lg mt-3">መዝግብ</button>
        </form>
      </div>
    </div>

  </div>

  <script>
    const monthlyFee = {{ settings.monthly_fee if settings else 3000 }};
    const termFee = {{ settings.term_fee if settings else 8000 }};

    function updateAmount() {
      const selected = document.getElementById('paymentTypeSelect').value;
      const display = document.getElementById('amountDisplay');
      const paidInput = document.getElementById('amountPaidInput');
      
      if (selected === 'Term (3 Months)') {
        display.value = termFee + ' ETB';
        paidInput.value = termFee;
      } else {
        display.value = monthlyFee + ' ETB';
        paidInput.value = monthlyFee;
      }
    }
  </script>

</body>
</html>
