<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የአስተዳዳሪ መግቢያ (Admin Login)</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        .login-card h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #34495e;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #3498db;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #2980b9;
        }
        .alert {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        .alert-danger {
            background-color: #fde8e8;
            color: #e74c3c;
            border: 1px solid #f8b4b4;
        }
        .alert-warning {
            background-color: #fef3c7;
            color: #d97706;
            border: 1px solid #fde68a;
        }
        .alert-info {
            background-color: #e0f2fe;
            color: #0284c7;
            border: 1px solid #bae6fd;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover {
            color: #3498db;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>የአስተዳዳሪ መግቢያ</h2>

    <!-- መልእክቶች (Alert Messages) -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
        <div class="form-group">
            <label>የተጠቃሚ ስም (Username)</label>
            <input type="text" name="username" placeholder="አድሚን ስም ያስገቡ" required>
        </div>
        <div class="form-group">
            <label>የይለፍ ቃል (Password)</label>
            <input type="password" name="password" placeholder="የይለፍ ቃል ያስገቡ" required>
        </div>
        <button type="submit" class="btn-login">ይግቡ</button>
    </form>

    <a href="/" class="back-link">← ወደ ምዝገባ ገፅ ተመለስ</a>
</div>

</body>
</html>
