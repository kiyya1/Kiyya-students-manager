<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <title>የተማሪዎች ኦንላይን ምዝገባ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .admin-btn-container {
      position: absolute;
      top: 20px;
      right: 20px;
    }
  </style>
</head>
<body class="bg-light position-relative">

  <!-- TOP-RIGHT ADMIN LOGIN BUTTON -->
  <div class="admin-btn-container">
    <a href="/login" class="btn btn-outline-dark fw-bold shadow-sm">
      🔐 Admin Login
    </a>
  </div>

  <div class="container my-5" style="max-width: 650px;">
    <div class="card shadow">
      <div class="card-header bg-primary text-white text-center py-3">
        <h4 class="mb-0">🏫 የተማሪዎች ምዝገባ ቅፅ</h4>
      </div>
      <div class="card-body p-4">

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/add_student" method="POST">
          <div class="mb-3">
            <label class="form-label fw-bold">የተማሪው ሙሉ ስም</label>
            <input type="text" name="full_name" class="form-control" required placeholder="ለምሳሌ፡ አበበ ከበደ">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">ክፍል (Grade)</label>
            <select name="grade" class="form-select" required>
              <option value="">ክፍል ይምረጡ...</option>
              <option value="Grade 1">Grade 1</option>
              <option value="Grade 2">Grade 2</option>
              <option value="Grade 3">Grade 3</option>
              <option value="Grade 4">Grade 4</option>
              <option value="Grade 5">Grade 5</option>
              <option value="Grade 6">Grade 6</option>
              <option value="Grade 7">Grade 7</option>
              <option value="Grade 8">Grade 8</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">የወላጅ/የተማሪ ስልክ ቁጥር</label>
            <input type="tel" name="phone" class="form-control" required placeholder="0911......">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">አድራሻ</label>
            <input type="text" name="address" class="form-control" value="{{ settings.default_address if settings else 'አቃቂ ቃሊቲ ወረዳ 09' }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">የክፍያ አይነት (Payment Option)</label>
            <select name="payment_type" class="form-select" required>
              <option value="Monthly (1 Month)">የወር ክፍያ ({{ "{:,.2f}".format(settings.monthly_fee) if settings else '3,000' }} ETB)</option>
              <option value="Term (3 Months)">የተርም ክፍያ ({{ "{:,.2f}".format(settings.term_fee) if settings else '8,000' }} ETB)</option>
            </select>
          </div>

          <!-- PAYMENT METHOD DROPDOWN -->
          <div class="mb-3">
            <label class="form-label fw-bold">የከፈሉበት መንገድ (Payment Method)</label>
            <select name="payment_method" id="payment_method_select" class="form-select" onchange="showAccountInfo()" required>
              <option value="">የክፍያ መንገድ ይምረጡ...</option>
              <option value="CBO">CBO (Cooperative Bank of Oromia)</option>
              <option value="CBE">CBE (Commercial Bank of Ethiopia)</option>
              <option value="Telebirr">Telebirr</option>
              <option value="Awash Bank">Awash Bank</option>
              <option value="Cash">በጥሬ ገንዘብ (Cash)</option>
            </select>
          </div>

          <!-- DYNAMIC ACCOUNT NUMBER DISPLAY BOX -->
          <div id="account_info_box" class="alert alert-info d-none" role="alert">
            <strong id="account_label">የባንክ ሂሳብ ቁጥር፦</strong>
            <h5 class="mb-0 mt-1 fw-bold text-primary" id="account_number_text"></h5>
            <small class="text-muted">እባክዎ በዚህ ቁጥር ገቢ ካደረጉ በኋላ የደረሰኝ ቁጥር (FT Ref) ከታች ያስገቡ።</small>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">የደረሰኝ ቁጥር (FT / Transaction Ref No.)</label>
            <input type="text" name="ft_approval_no" class="form-control" required placeholder="ለምሳሌ፡ FT2407XXXXXX">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">የከፈሉት የገንዘብ መጠን (Amount Paid in ETB)</label>
            <input type="number" step="0.01" name="amount_paid" class="form-control" required placeholder="ለምሳሌ፡ 3000">
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">ምዝገባውን አጠናቅ</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const accounts = {
      "CBO": "{{ settings.cbo_acc if settings else '' }}",
      "CBE": "{{ settings.cbe_acc if settings else '' }}",
      "Telebirr": "{{ settings.telebirr_acc if settings else '' }}",
      "Awash Bank": "{{ settings.awash_acc if settings else '' }}"
    };

    function showAccountInfo() {
      const selected = document.getElementById("payment_method_select").value;
      const infoBox = document.getElementById("account_info_box");
      const numText = document.getElementById("account_number_text");

      if (accounts[selected]) {
        numText.innerText = accounts[selected];
        infoBox.classList.remove("d-none");
      } else {
        infoBox.classList.add("d-none");
      }
    }
  </script>

</body>
</html>
